<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>QR Membership System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4">

    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-extrabold tracking-tight">Member Scanner</h1>
            <p class="text-indigo-100 text-sm">Secure Card Issuing System</p>
        </div>

        <div class="p-5">
            <div id="reader" class="overflow-hidden rounded-2xl bg-black mb-4"></div>
            
            <div id="controls" class="space-y-3">
                <button id="startBtn" onclick="initScanner()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
                    Allow & Start Camera
                </button>

                <button onclick="exportData()" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
                    Export to Excel & WhatsApp
                </button>

                <button id="resetBtn" onclick="clearStorage()" class="hidden w-full bg-white text-red-500 border-2 border-red-100 font-bold py-3 rounded-2xl">
                    Reset All Data
                </button>
            </div>
        </div>

        <div class="p-5 bg-slate-50 border-t border-slate-100">
            <h3 class="text-slate-500 font-bold text-xs uppercase tracking-widest mb-3">Recent Activity</h3>
            <div id="scans" class="space-y-2 text-sm max-h-48 overflow-y-auto"></div>
        </div>
    </div>

    <script>
       let html5QrCode;
let isProcessing = false; // Flag to prevent multiple scans

const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');

function initScanner() {
    html5QrCode = new Html5Qrcode("reader");
    const config = { 
        fps: 10, 
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0 
    };

    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .then(() => {
            startBtn.classList.add('hidden');
        })
        .catch(err => {
            Swal.fire('Camera Error', 'Ensure you are on HTTPS and allow camera access.', 'error');
        });
}

function onScanSuccess(decodedText) {
    // If we are already showing a modal, ignore new scans
    if (isProcessing) return;
    
    isProcessing = true; // Lock the scanner logic

    let data = JSON.parse(localStorage.getItem('member_db')) || [];
    const exists = data.find(m => m.id === decodedText);

    if (exists) {
        Swal.fire({
            icon: 'warning',
            title: 'Already Issued',
            html: `<div class="p-2 bg-orange-50 rounded">
                    <p class="font-bold text-lg">${decodedText}</p>
                    <p class="text-sm">Issued: ${exists.timestamp}</p>
                   </div>`,
            confirmButtonText: 'Scan Next',
            confirmButtonColor: '#4f46e5'
        }).then(() => {
            isProcessing = false; // Unlock after user clicks button
        });
    } else {
        const entry = {
            id: decodedText,
            timestamp: new Date().toLocaleString()
        };
        data.push(entry);
        localStorage.setItem('member_db', JSON.stringify(data));
        updateLog();

        Swal.fire({
            icon: 'success',
            title: 'Card Registered',
            text: `ID: ${decodedText}`,
            confirmButtonText: 'Scan Next',
            confirmButtonColor: '#10b981'
        }).then(() => {
            isProcessing = false; // Unlock after user clicks button
        });
    }
}

function updateLog() {
    const data = JSON.parse(localStorage.getItem('member_db')) || [];
    const container = document.getElementById('scans');
    container.innerHTML = data.slice().reverse().slice(0, 5).map(m => `
        <div class="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm border border-slate-100">
            <span class="font-mono font-bold text-indigo-900">${m.id}</span>
            <span class="text-[10px] text-slate-400 font-medium">${m.timestamp}</span>
        </div>
    `).join('');
}

function exportData() {
    const data = JSON.parse(localStorage.getItem('member_db')) || [];
    if (data.length === 0) return Swal.fire('No Data', 'Scan some cards first!', 'info');

    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Members");
    
    const fName = `Membership_List_${Date.now()}.xlsx`;
    XLSX.writeFile(wb, fName);

    // Provide WhatsApp link
    window.open(`https://wa.me/?text=Membership Export Generated: ${fName}`, '_blank');
    resetBtn.classList.remove('hidden');
}

function clearStorage() {
    Swal.fire({
        title: 'Reset Everything?',
        text: "This will permanently delete the local storage logs.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        confirmButtonText: 'Yes, Delete'
    }).then((res) => {
        if (res.isConfirmed) {
            localStorage.removeItem('member_db');
            updateLog();
            resetBtn.classList.add('hidden');
        }
    });
}

// Initial display of data
updateLog();
    </script>
</body>
</html>
